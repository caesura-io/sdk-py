[project]
name = "caesura-io-openai"
version = "1.0.3"
description = "Transparent wrapper for the OpenAI Python SDK to inject Caesura recommendations."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "CaesuraO" }]
keywords = ["caesura", "ai", "llm", "recommendations", "openai"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "caesura-io-core",
    "openai>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/caesura-io/sdk-py/tree/main/packages/caesura-openai#readme"
Repository = "https://github.com/caesura-io/sdk-py"
Issues = "https://github.com/caesura-io/sdk-py/issues"

[tool.uv.sources]
caesura-io-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/caesura_openai"]


