[project]
name = "caesura-io-core"
version = "0.1.0"
description = "Framework-agnostic core for Caesura — analyze, inject, and credit-metering logic shared across SDK integrations."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "CaesuraO" }]
keywords = ["caesura", "ai", "llm", "recommendations", "core"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Typing :: Typed",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/caesura-io/sdk-py/tree/main/packages/caesura-core#readme"
Repository = "https://github.com/caesura-io/sdk-py"
Issues = "https://github.com/caesura-io/sdk-py/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/caesura_core"]


